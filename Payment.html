<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>HouseZone - Payment</title>
<style>
    /* สไตล์พื้นฐาน */
    body { font-family: 'Sarabun', 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; color: #333; line-height: 1.6; }
    table { border-collapse: collapse; margin-bottom: 20px; background-color: rgba(255, 255, 255, 0.95); border-radius: 15px; overflow: hidden; }
    img { display: block; border-radius: 10px; }
    .nav-table { background: none; box-shadow: none; }

    /* สไตล์เฉพาะหน้า Payment */
    .payment-container { padding: 40px; }
    .section-header { font-size: 24px; color: #4677EE; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; font-weight: bold; }
    
    /* กล่องสรุปยอด */
    .order-summary { background-color: #f9f9f9; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 18px; }
    .total-price { color: #E74C3C; font-weight: bold; font-size: 28px; }

    /* กล่องโอนเงิน */
    .bank-transfer-box { border: 1px solid #ddd; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    .bank-info { display: flex; align-items: center; margin-bottom: 15px; }
    .bank-icon { width: 50px; height: 50px; background-color: #eee; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #555; }
    
    /* ฟอร์มแนบสลิป */
    .upload-box { margin-top: 20px; }
    .upload-box input { padding: 10px; width: 100%; box-sizing: border-box; }

    /* ปุ่มยืนยัน */
    .btn-confirm { 
        width: 100%; 
        padding: 15px; 
        background-color: #2ECC71; 
        color: white; 
        border: none; 
        border-radius: 30px; 
        font-size: 20px; 
        font-weight: bold; 
        cursor: pointer; 
        transition: background-color 0.3s; 
        box-shadow: 0 4px 10px rgba(46, 204, 113, 0.4);
    }
    .btn-confirm:hover { background-color: #27ae60; transform: translateY(-2px); }
</style>

<script src="house-script.js"></script>

<script type="text/javascript">
function MM_swapImgRestore() { var i,x,a=document.MM_sr; for(i=0;a&&i<a.length&&(x=a[i])&&x.oSrc;i++) x.src=x.oSrc; }
function MM_preloadImages() { var d=document; if(d.images){ if(!d.MM_p) d.MM_p=new Array(); var i,j=d.MM_p.length,a=MM_preloadImages.arguments; for(i=0; i<a.length; i++) if (a[i].indexOf("#")!=0){ d.MM_p[j]=new Image; d.MM_p[j++].src=a[i];}} }
function MM_findObj(n, d) { var p,i,x; if(!d) d=document; if((p=n.indexOf("?"))>0&&parent.frames.length) { d=parent.frames[n.substring(p+1)].document; n=n.substring(0,p);} if(!(x=d[n])&&d.all) x=d.all[n]; for (i=0;!x&&i<d.forms.length;i++) x=d.forms[i][n]; for(i=0;!x&&d.layers&&i<d.layers.length;i++) x=MM_findObj(n,d.layers[i].document); if(!x && d.getElementById) x=d.getElementById(n); return x; }
function MM_swapImage() { var i,j=0,x,a=MM_swapImage.arguments; document.MM_sr=new Array; for(i=0;i<(a.length-2);i+=3) if ((x=MM_findObj(a[i]))!=null){document.MM_sr[j++]=x; if(!x.oSrc) x.oSrc=x.src; x.src=a[i+2];} }

// ฟังก์ชันคำนวณเงินจริง
function loadPaymentDetails() {
    // ดึงยอดรวมจาก localStorage ที่คำนวณไว้หน้า Basket
    var totalStr = localStorage.getItem('totalPayment') || "฿0";
    
    // แปลงยอดเงินเป็นตัวเลข (ตัด ฿ และ , ออก)
    var subtotal = parseInt(totalStr.replace(/[^0-9]/g, '')) || 0;
    
    if(subtotal === 0) {
        alert("ตะกร้าสินค้าว่างเปล่า กรุณาเลือกสินค้าก่อนครับ");
        window.location.href = "Buy.html";
        return;
    }

    // คำนวณ VAT 7%
    var vat = subtotal * 0.07;
    // ยอดสุทธิ
    var grandTotal = subtotal + vat;

    // แสดงผลบนหน้าจอ (ใส่ลูกน้ำกลับเข้าไป)
    document.getElementById('display-subtotal').innerText = "฿" + subtotal.toLocaleString();
    document.getElementById('display-vat').innerText = "฿" + vat.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
    document.getElementById('display-total').innerText = "฿" + grandTotal.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
}

function confirmPayment() {
    var fileInput = document.getElementById('slipUpload');
    if(fileInput.value == "") {
        alert("กรุณาแนบหลักฐานการโอนเงิน (สลิป) ก่อนยืนยันครับ");
        return;
    }

    if(confirm("ยืนยันการชำระเงินใช่หรือไม่?")) {
        alert("ขอบคุณครับ! ชำระเงินสำเร็จ \nเจ้าหน้าที่จะตรวจสอบและติดต่อกลับภายใน 24 ชม.");
        
        // ล้างตะกร้าสินค้า
        clearCart();
        localStorage.removeItem('totalPayment');
        
        window.location.href = "index.html"; 
    }
}
</script>
</head>

                  <td><a href="Data.html" onMouseOut="MM_swapImgRestore()" onMouseOver="MM_swapImage('Image11','','../Downloads/Compressed/HOme Click/5.png',1)"><img src="../Downloads/Compressed/HOme/5.png" alt="Data" width="100" height="50" id="Image11"></a></td>
                  <td><a href="Basket.html" onMouseOut="MM_swapImgRestore()" onMouseOver="MM_swapImage('Image6','','../Downloads/Compressed/HOme Click/6.png',1)"><img src="../Downloads/Compressed/HOme/6.png" alt="Basket" width="100" height="50" id="Image6"></a></td>

                                <div class="order-summary">
                                    <div class="summary-row">

</header>
